<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>飞船躲避游戏</title>

<style>
  body {
    margin: 0;
    background: black;
    color: white;
    text-align: center;
    font-family: Arial;
  }

  canvas {
    background: #000;
    display: block;
    margin: auto;
    border: 2px solid #444;
  }

  #ui {
    margin-top: 10px;
  }

  button {
    padding: 8px 18px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h2>🚀 飞船躲避游戏</h2>
<canvas id="game" width="400" height="600"></canvas>

<div id="ui">
  分数：<span id="score">0</span>
  <br><br>
<input id="playerName" placeholder="请输入名字">
<br><br>
  <button onclick="startGame()">开始游戏</button>
  <button onclick="exitGame()">离开游戏</button>
</div>

<script>
const shipImg = new Image();
shipImg.src = "orm1.png";

const meteorImg = new Image();
meteorImg.src = "ling1.png";

const bonusImg = new Image();
bonusImg.src = "bonus.png";

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let bonuses = [];
let ship, meteors, score, gameOver, gameRunning;
let keys = {};
let playerName = "";
let rankingShown = false;
let showRankingScreen = false;
let level = 1;
let speedMultiplier = 1;
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function startGame() {
const nameInput = document.getElementById("playerName");
playerName = nameInput.value.trim();

if (!playerName) {
  alert("请输入名字！");
  return;
}
showRankingScreen = false; // ⭐关闭排行榜界面
gameOver = false;
gameRunning = true;
level = 1;
speedMultiplier = 1;
  ship = { x: 180, y: 540, w: 40, h: 40, speed: 5 };
  meteors = [];
  score = 0;
  gameOver = false;
  gameRunning = true;
  loop();
}
function exitGame() {
  gameRunning = false;
  gameOver = true;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "white";
  ctx.font = "26px Arial";
  ctx.fillText("已离开游戏", 120, 300);
}

function spawnMeteor() {
  meteors.push({
    x: Math.random() * 360,
    y: -20,
    size: 20 + Math.random()*20,
    speed: 2 + Math.random()*3
  });
}

function update() {
  if (!gameRunning) return;

  // 飞船移动
  if (keys["ArrowLeft"]) ship.x -= ship.speed;
  if (keys["ArrowRight"]) ship.x += ship.speed;

  ship.x = Math.max(0, Math.min(canvas.width - ship.w, ship.x));

  // 陨石移动
 meteors.forEach(m => {
  m.y += m.speed * speedMultiplier;
});

bonuses.forEach(b => {
  b.y += b.speed * speedMultiplier;
});

  // 碰撞检测
  meteors.forEach(m => {
    if (
      m.x < ship.x + ship.w &&
      m.x + m.size > ship.x &&
      m.y < ship.y + ship.h &&
      m.y + m.size > ship.y
    ) {
      gameOver = true;
      gameRunning = false;
      rankingShown = true;

      saveScore();
      showRankingScreen = true;
 
    }
  });
  bonuses.forEach((b, index) => {
  if (
    b.x < ship.x + ship.w &&
    b.x + b.size > ship.x &&
    b.y < ship.y + ship.h &&
    b.y + b.size > ship.y
  ) {
    score += 200; // 奖励分数
    bonuses.splice(index, 1); // 吃掉奖励
  }
  });
  // 删除离开屏幕的陨石
  meteors = meteors.filter(m => m.y < canvas.height + 50);
  bonuses = bonuses.filter(b => b.y < canvas.height + 50);
  // 随机生成陨石
  if (Math.random() < 0.03) spawnMeteor();

  if (Math.random() < 0.0008) {
  spawnBonus();
  }
  score++;
  let newLevel = Math.floor(score / 1000) + 1;

 if (newLevel !== level) {
    level = newLevel;
    speedMultiplier = 1 + level * 0.3;
 }
  document.getElementById("score").innerText = score;
}

function drawShip() {
  ctx.drawImage(
    shipImg,
    ship.x,
    ship.y,
    ship.w,
    ship.h
  );
}

function drawMeteor(m) {
  ctx.drawImage(
  meteorImg,
  m.x,
  m.y,
  m.size,
  m.size
);
}

function draw() {

  ctx.clearRect(0,0,canvas.width,canvas.height);
 // ⭐ 如果显示排行榜
  if (showRankingScreen) {
    drawRankingScreen();
    return; // 直接结束，不再画游戏元素
  }
  drawShip();
  meteors.forEach(drawMeteor);
  bonuses.forEach(drawBonus);
ctx.fillStyle = "white";
ctx.font = "16px Arial";
ctx.fillText("Lv." + level, 10, 20);
  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "28px Arial";
    ctx.fillText("游戏结束", 130, 300);
  }
}
function saveScore() {

  let ranking =
    JSON.parse(localStorage.getItem("ranking")) || [];

  // 查找是否已有这个玩家
  let player = ranking.find(p => p.name === playerName);

  if (player) {
    // 如果新分数更高才更新
    if (score > player.score) {
      player.score = score;
    }
  } else {
    // 新玩家
    ranking.push({
      name: playerName,
      score: score
    });
  }

  // 排序
  ranking.sort((a, b) => b.score - a.score);

  // 只保留前10
  ranking = ranking.slice(0, 10);

  localStorage.setItem("ranking", JSON.stringify(ranking));
}
function showRanking() {

  let ranking =
    JSON.parse(localStorage.getItem("ranking")) || [];

  ctx.fillStyle = "white";
  ctx.font = "18px Arial";

  ctx.fillText("排行榜", 150, 340);

  ranking.forEach((p,i)=>{
    ctx.fillText(
      `${i+1}. ${p.name} - ${p.score}`,
      100,
      370 + i*25
    );
  });
}
function drawRankingScreen() {

  ctx.fillStyle = "white";
  ctx.font = "26px Arial";
  ctx.fillText("排行榜", 150, 120);

  let ranking =
    JSON.parse(localStorage.getItem("ranking")) || [];

  ctx.font = "18px Arial";

  ranking.forEach((p, i) => {
    ctx.fillText(
      `${i+1}. ${p.name} - ${p.score}`,
      100,
      170 + i * 30
    );
  });
}
function loop() {
  update();
  draw();
  if (!gameOver) requestAnimationFrame(loop);
}
function drawBonus(b) {
  ctx.drawImage(
    bonusImg,
    b.x,
    b.y,
    b.size,
    b.size
  );
}
function spawnBonus() {
  bonuses.push({
    x: Math.random() * 360,
    y: -20,
    size: 30,
    speed: 2
  });
}
</script>

</body>
</html>
